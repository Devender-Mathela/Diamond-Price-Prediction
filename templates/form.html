<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diamond Price Prediction</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:420px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form-group{
    margin-bottom:15px;
}

label{
    font-weight:bold;
    display:block;
    margin-bottom:5px;
}

input, select{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus, select:focus{
    outline:none;
    border:1px solid #4facfe;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#4facfe;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#008cff;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:#2c3e50;
}

</style>

</head>

<body>

<div class="container">

<h1>Diamond Price Prediction</h1>

<form action="{{url_for('predict_datapoint')}}" method="POST">

<div class="form-group">
<label>Carat</label>
<input type="text" name="carat" placeholder="Enter carat value">
</div>

<div class="form-group">
<label>Depth</label>
<input type="text" name="depth" placeholder="Enter depth value">
</div>

<div class="form-group">
<label>Table</label>
<input type="text" name="table" placeholder="Enter table value">
</div>

<div class="form-group">
<label>X Dimension</label>
<input type="text" name="x" placeholder="Enter x value">
</div>

<div class="form-group">
<label>Y Dimension</label>
<input type="text" name="y" placeholder="Enter y value">
</div>

<div class="form-group">
<label>Z Dimension</label>
<input type="text" name="z" placeholder="Enter z value">
</div>

<div class="form-group">
<label>Cut</label>
<select name="cut">
<option value="Fair">Fair</option>
<option value="Good">Good</option>
<option value="Very Good">Very Good</option>
<option value="Premium">Premium</option>
<option value="Ideal">Ideal</option>
</select>
</div>

<div class="form-group">
<label>Color</label>
<select name="color">
<option value="D">D</option>
<option value="E">E</option>
<option value="F">F</option>
<option value="G">G</option>
<option value="H">H</option>
<option value="I">I</option>
<option value="J">J</option>
</select>
</div>

<div class="form-group">
<label>Clarity</label>
<select name="clarity">
<option value="I1">I1</option>
<option value="SI2">SI2</option>
<option value="SI1">SI1</option>
<option value="VS2">VS2</option>
<option value="VS1">VS1</option>
<option value="VVS2">VVS2</option>
<option value="VVS1">VVS1</option>
<option value="IF">IF</option>
</select>
</div>

<button type="submit">Predict Price</button>

</form>

<div class="result">
{{final_result}}
</div>

</div>

</body>
</html>
